<svg width="440" height="280" viewBox="0 0 440 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11151b"/>
      <stop offset="1" stop-color="#05070a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0.15" r="0.9">
      <stop offset="0" stop-color="#1d9bf0" stop-opacity="0.35"/>
      <stop offset="0.6" stop-color="#1d9bf0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2027"/>
      <stop offset="1" stop-color="#0a0c10"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="440" height="280" fill="url(#bg)"/>
  <rect width="440" height="280" fill="url(#glow)"/>

  <!-- glass tile with X + auto-advance bar -->
  <g transform="translate(40,84)">
    <rect width="112" height="112" rx="28" fill="url(#tile)"/>
    <rect x="0.5" y="0.5" width="111" height="111" rx="27.5" fill="none" stroke="url(#hair)" stroke-width="1.5"/>
    <g transform="translate(56,50) scale(2.4) translate(-12,-12)">
      <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" fill="#f2f4f7"/>
    </g>
    <rect x="34" y="86" width="44" height="5" rx="2.5" fill="#1d9bf0"/>
  </g>

  <!-- wordmark + tagline -->
  <text x="186" y="128" font-family="-apple-system, system-ui, sans-serif" font-size="44" font-weight="800" fill="#f2f4f7" letter-spacing="-1">FloatX</text>
  <text x="188" y="160" font-family="-apple-system, system-ui, sans-serif" font-size="17" font-weight="500" fill="#8b98a5">an ambient shower of</text>
  <text x="188" y="184" font-family="-apple-system, system-ui, sans-serif" font-size="17" font-weight="500" fill="#8b98a5">x posts, floating on screen</text>
</svg>
