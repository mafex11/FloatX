<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glass tile gradient: deep dark with a subtle blue lift -->
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2027"/>
      <stop offset="1" stop-color="#0a0c10"/>
    </linearGradient>
    <!-- Blue accent glow, top-left -->
    <radialGradient id="glow" cx="0.25" cy="0.1" r="0.9">
      <stop offset="0" stop-color="#1d9bf0" stop-opacity="0.45"/>
      <stop offset="0.6" stop-color="#1d9bf0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hairline" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Floating glass tile (the PiP window) -->
  <rect x="10" y="10" width="108" height="108" rx="28" fill="url(#tile)"/>
  <rect x="10" y="10" width="108" height="108" rx="28" fill="url(#glow)"/>
  <!-- hairline top highlight + border -->
  <rect x="10.5" y="10.5" width="107" height="107" rx="27.5" fill="none" stroke="url(#hairline)" stroke-width="1.5"/>
  <rect x="11" y="11" width="106" height="106" rx="27" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- X glyph, centered -->
  <g transform="translate(64,62)" fill="#f2f4f7">
    <path d="M -22 -22 L -9 -22 L 6 -1.5 L 21 -22 L 30 -22 L 11 3.5 L 31 30 L 18 30 L 1.5 8 L -16 30 L -25 30 L -4.5 3 Z"/>
  </g>

  <!-- bottom accent bar (the progress/drip cue) -->
  <rect x="34" y="98" width="60" height="4" rx="2" fill="#1d9bf0" opacity="0.9"/>
</svg>
