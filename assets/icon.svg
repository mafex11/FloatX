<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2027"/>
      <stop offset="1" stop-color="#070a0e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.12" r="0.9">
      <stop offset="0" stop-color="#1d9bf0" stop-opacity="0.5"/>
      <stop offset="0.6" stop-color="#1d9bf0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wht" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dfeaf4"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4cb8ff"/>
      <stop offset="1" stop-color="#1d9bf0"/>
    </linearGradient>
  </defs>

  <!-- glass tile -->
  <rect x="10" y="10" width="108" height="108" rx="28" fill="url(#tile)"/>
  <rect x="10" y="10" width="108" height="108" rx="28" fill="url(#glow)"/>
  <rect x="10.5" y="10.5" width="107" height="107" rx="27.5" fill="none" stroke="url(#hair)" stroke-width="1.5"/>

  <!-- X mark, centered above the progress bar -->
  <g transform="translate(64,58) scale(3.0) translate(-12,-12)">
    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" fill="url(#wht)"/>
  </g>

  <!-- blue progress / auto-advance accent -->
  <rect x="40" y="98" width="48" height="6" rx="3" fill="url(#blue)"/>
</svg>
